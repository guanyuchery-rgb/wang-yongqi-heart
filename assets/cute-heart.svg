<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Natural glowing heart</title>
  <desc id="desc">A soft pink heart with a gentle face and subtle glow.</desc>
  <defs>
    <radialGradient id="heartGlow" cx="50%" cy="48%" r="58%">
      <stop offset="0" stop-color="#ff9fc6"/>
      <stop offset="0.58" stop-color="#ff4f91"/>
      <stop offset="1" stop-color="#db235f"/>
    </radialGradient>
    <linearGradient id="heartShade" x1="95" y1="56" x2="230" y2="258" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd2e3" stop-opacity="0.84"/>
      <stop offset="0.32" stop-color="#ff7fb1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c1237" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="outerGlow" x="-35%" y="-35%" width="170%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#ff4f91" flood-opacity="0.42"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="160" cy="174" rx="94" ry="100" fill="#ff4f91" opacity="0.12"/>
  <g filter="url(#outerGlow)">
    <path
      d="M160 263c-9-7-18-14-26-21C83 199 58 165 58 123c0-35 25-62 60-62 18 0 34 7 45 20 11-13 27-20 45-20 35 0 60 27 60 62 0 42-25 76-76 119-8 7-17 14-32 21Z"
      fill="url(#heartGlow)"
    />
    <path
      d="M160 263c-9-7-18-14-26-21C83 199 58 165 58 123c0-35 25-62 60-62 18 0 34 7 45 20 11-13 27-20 45-20 35 0 60 27 60 62 0 42-25 76-76 119-8 7-17 14-32 21Z"
      fill="url(#heartShade)"
    />
  </g>

  <path
    d="M101 112c6-20 24-32 43-29"
    fill="none"
    stroke="#ffe4ef"
    stroke-width="9"
    stroke-linecap="round"
    opacity="0.48"
  />
  <ellipse cx="128" cy="138" rx="7" ry="10" fill="#3d1728" opacity="0.86"/>
  <ellipse cx="192" cy="138" rx="7" ry="10" fill="#3d1728" opacity="0.86"/>
  <path d="M141 174c11 10 27 10 38 0" fill="none" stroke="#3d1728" stroke-width="6" stroke-linecap="round" opacity="0.84"/>
  <circle cx="111" cy="162" r="11" fill="#ffb3ca" opacity="0.34"/>
  <circle cx="209" cy="162" r="11" fill="#ffb3ca" opacity="0.34"/>

  <circle cx="65" cy="83" r="3" fill="#5bf2d1" opacity="0.8"/>
  <circle cx="256" cy="99" r="4" fill="#ffb36b" opacity="0.7"/>
  <circle cx="245" cy="222" r="3" fill="#9d7cff" opacity="0.74"/>
</svg>
