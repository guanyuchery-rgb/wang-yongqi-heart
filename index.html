<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="给最可爱的琪琪虾" />
    <title>给最可爱的琪琪虾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-label="给最可爱的琪琪虾">
        <div class="floating-hearts" aria-hidden="true">
          <span style="--x: 8%; --d: 0s; --s: 0.8">♥</span>
          <span style="--x: 18%; --d: 1.4s; --s: 1.1">♥</span>
          <span style="--x: 32%; --d: 0.5s; --s: 0.7">♥</span>
          <span style="--x: 48%; --d: 2.1s; --s: 1">♥</span>
          <span style="--x: 62%; --d: 0.9s; --s: 0.75">♥</span>
          <span style="--x: 78%; --d: 1.8s; --s: 1.2">♥</span>
          <span style="--x: 91%; --d: 0.2s; --s: 0.9">♥</span>
        </div>

        <div class="hero-visual">
          <img src="assets/cute-heart.svg" alt="一颗可爱的爱心" />
        </div>

        <p class="eyebrow">A tiny love page</p>
        <h1>给最可爱的琪琪虾</h1>
        <p class="message">
          今天也要把一颗软乎乎的小爱心送给你。
        </p>
        <button class="heart-button" type="button" id="heartButton">
          点一下收下爱心
        </button>
        <p class="counter" id="counter" aria-live="polite">
          已经送出 0 颗小爱心
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
